<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChroFlow — Coming Soon</title>
  <meta name="description" content="ChroFlow is coming soon. Daily notes, passive time tracking, and visual timeline search — all in one place." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #FF6B6B, #9B59B6, #4A90D9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1.125rem;
      color: #6e6e73;
      max-width: 400px;
      line-height: 1.6;
    }

    a {
      color: #4A90D9;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: #a0a0a5;
    }
  </style>
</head>
<body>

  <h1>Coming Soon</h1>

  <p>We're putting the finishing touches on ChroFlow.<br>

  <footer>© 2026 ChroFlow</footer>

</body>
</html>
